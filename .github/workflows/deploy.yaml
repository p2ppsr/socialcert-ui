name: Deploy with CARS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: socialcert-ui-cars
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build CARS artifact
        run: npx cars build 1

      - name: Release CARS artifact
        run: npx cars release now 1 --key "$CARS_PRIVATE_KEY" --network mainnet --storage https://storage.babbage.systems
        env:
          CARS_PRIVATE_KEY: ${{ secrets.CARS_PRIVATE_KEY }}
